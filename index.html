<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 DΞMON LINK ARCHIVE</title>
    <!-- Google Fonts für Cyber-Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ===== GLOBAL RESET & THEME ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d0f;
            color: #c0d0e0;
            font-family: 'Share Tech Mono', monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 255, 200, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 200, 0.03) 0%, transparent 50%);
        }

        /* ===== GLITCH-TITEL ===== */
        .glitch-wrapper {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            color: #00ffe0;
            text-shadow: 0 0 10px #00ffe0, 0 0 20px #00ffe0, 0 0 40px #00aaff, 0 0 80px #00aaff;
            letter-spacing: 4px;
            animation: glitch 3s infinite;
            position: relative;
            display: inline-block;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b0d0f;
            overflow: hidden;
            clip-path: inset(0 0 0 0);
        }

        .glitch::before {
            color: #ff00c8;
            z-index: -1;
            animation: glitch-before 2.5s infinite linear alternate-reverse;
        }

        .glitch::after {
            color: #00ffe0;
            z-index: -2;
            animation: glitch-after 3s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); }
            5% { transform: skew(2deg, -1deg); }
            10% { transform: skew(0deg, 0deg); }
            15% { transform: skew(-2deg, 1deg); }
            20% { transform: skew(0deg, 0deg); }
        }

        @keyframes glitch-before {
            0% { clip-path: inset(20% 0 60% 0); }
            20% { clip-path: inset(40% 0 30% 0); }
            40% { clip-path: inset(10% 0 70% 0); }
            60% { clip-path: inset(80% 0 10% 0); }
            80% { clip-path: inset(30% 0 50% 0); }
            100% { clip-path: inset(50% 0 30% 0); }
        }

        @keyframes glitch-after {
            0% { clip-path: inset(60% 0 10% 0); }
            20% { clip-path: inset(30% 0 50% 0); }
            40% { clip-path: inset(70% 0 20% 0); }
            60% { clip-path: inset(10% 0 80% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(20% 0 60% 0); }
        }

        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            color: #88aabb;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            letter-spacing: 3px;
            margin-top: -10px;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.3);
        }

        /* ===== SUCHLEISTE ===== */
        .search-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 16px 20px;
            background: #14181c;
            border: 1px solid #2a3a40;
            border-radius: 50px;
            color: #e0f0f0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.1);
            letter-spacing: 1px;
        }

        .search-container input:focus {
            border-color: #00ffe0;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.2);
            background: #0f161a;
        }

        .search-container input::placeholder {
            color: #4a6a72;
            letter-spacing: 2px;
        }

        .search-container .counter {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #4a6a72;
            font-size: 0.8rem;
            pointer-events: none;
        }

        /* ===== LINK-KARTEN (GRID) ===== */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .link-card {
            background: #11171c;
            border: 1px solid #1e2e34;
            border-radius: 12px;
            padding: 18px 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffe0, #ff00c8, #00ffe0, #ff00c8);
            background-size: 400% 400%;
            border-radius: 14px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
            animation: border-glow 6s ease infinite;
        }

        .link-card:hover::before {
            opacity: 0.15;
        }

        .link-card:hover {
            transform: translateY(-5px);
            border-color: #00ffe0;
            box-shadow: 0 8px 40px rgba(0, 255, 200, 0.15);
        }

        @keyframes border-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .link-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .link-card .card-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #e0f0f0;
            text-decoration: none;
            transition: color 0.3s;
            word-break: break-word;
            line-height: 1.3;
        }

        .link-card .card-name:hover {
            color: #00ffe0;
            text-shadow: 0 0 20px #00ffe0;
        }

        .link-card .card-url {
            font-size: 0.75rem;
            color: #4a7a82;
            word-break: break-all;
            margin: 6px 0 10px 0;
            display: block;
            font-family: 'Share Tech Mono', monospace;
            text-decoration: none;
            transition: color 0.3s;
        }

        .link-card .card-url:hover {
            color: #88c0c8;
        }

        .link-card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .link-card .tag {
            background: #1a2a30;
            color: #6a9aa0;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            border: 1px solid #1e3a42;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .link-card .tag:hover {
            background: #00ffe0;
            color: #0b0d0f;
            border-color: #00ffe0;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.2);
        }

        .link-card .card-id {
            font-size: 0.6rem;
            color: #2a4a52;
            margin-right: 6px;
            background: #0f1a1e;
            padding: 0 6px;
            border-radius: 4px;
            border: 1px solid #1a2a30;
        }

        /* ===== STATS ===== */
        .stats {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #4a7a82;
            border-top: 1px solid #1a2a30;
            padding-top: 15px;
            margin-top: 20px;
        }

        .stats span {
            font-family: 'Share Tech Mono', monospace;
        }

        .stats .highlight {
            color: #00ffe0;
            font-weight: bold;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .link-grid {
                grid-template-columns: 1fr;
            }
            .glitch {
                font-size: 2rem;
            }
            .search-container input {
                font-size: 0.9rem;
                padding: 14px 16px;
            }
            .link-card .card-name {
                font-size: 0.95rem;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            background: #0b0d0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a3a42;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ffe0;
        }

        /* ===== STATUS (LADE- / FEHLERMELDUNG) ===== */
        .status {
            text-align: center;
            padding: 40px;
            color: #4a7a82;
            font-size: 1.2rem;
            width: 100%;
        }

        .status.error {
            color: #ff0066;
            text-shadow: 0 0 20px #ff0066;
        }

        .status.loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>
<body>

    <div class="glitch-wrapper">
        <div class="glitch" data-text="DΞMON LINK ARCHIVE">DΞMON LINK ARCHIVE</div>
        <div class="subtitle">// your digital armory //</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 SEARCH BY NAME, URL OR TAGS ..." autofocus>
        <span class="counter" id="resultCounter">0 links</span>
    </div>

    <div id="linkGrid" class="link-grid">
        <div class="status loading">⏳ LOADING DATA</div>
    </div>

    <div class="stats">
        <span>📦 <span id="totalCount" class="highlight">0</span> resources</span>
        <span>⚡ <span id="visibleCount" class="highlight">0</span> visible</span>
        <span>🕶️ DΞMON CORE v7.0</span>
    </div>

    <script>
        (function() {
            'use strict';

            const grid = document.getElementById('linkGrid');
            const searchInput = document.getElementById('searchInput');
            const resultCounter = document.getElementById('resultCounter');
            const totalCountSpan = document.getElementById('totalCount');
            const visibleCountSpan = document.getElementById('visibleCount');

            let allLinks = [];
            let filteredLinks = [];

            // ===== LADE JSON =====
            async function loadLinks() {
                try {
                    const response = await fetch('links.json?_=' + Date.now()); // Cache-Bust
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (data && Array.isArray(data.links)) {
                        allLinks = data.links;
                    } else {
                        throw new Error('Ungültiges JSON-Format');
                    }
                } catch (error) {
                    console.error('Fehler beim Laden:', error);
                    grid.innerHTML = `<div class="status error">⚠️ FEHLER BEIM LADEN DER LINKS.<br><small>${error.message}</small></div>`;
                    return;
                }

                // Initial anzeigen
                filteredLinks = allLinks;
                renderLinks(allLinks);
                updateStats(allLinks.length, allLinks.length);
            }

            // ===== RENDER =====
            function renderLinks(links) {
                if (!links || links.length === 0) {
                    grid.innerHTML = `<div class="status">🔍 KEINE LINKS GEFUNDEN</div>`;
                    return;
                }

                let html = '';
                links.forEach(link => {
                    const tags = (link.tags && Array.isArray(link.tags)) ? link.tags : [];
                    const tagHtml = tags.map(tag => `<span class="tag">${escapeHTML(tag)}</span>`).join('');

                    html += `
                        <div class="link-card">
                            <div class="card-header">
                                <a href="${escapeHTML(link.url)}" target="_blank" class="card-name" rel="noopener noreferrer">
                                    <span class="card-id">#${link.id || '?'}</span>
                                    ${escapeHTML(link.name || 'Unbenannt')}
                                </a>
                            </div>
                            <a href="${escapeHTML(link.url)}" target="_blank" class="card-url" rel="noopener noreferrer">
                                ${escapeHTML(link.url)}
                            </a>
                            <div class="card-tags">
                                ${tagHtml}
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = html;
            }

            // ===== SUCHFILTER =====
            function filterLinks(searchTerm) {
                const term = searchTerm.trim().toLowerCase();
                if (!term) {
                    filteredLinks = allLinks;
                } else {
                    filteredLinks = allLinks.filter(link => {
                        const name = (link.name || '').toLowerCase();
                        const url = (link.url || '').toLowerCase();
                        const tags = (link.tags && Array.isArray(link.tags)) ? link.tags.map(t => t.toLowerCase()).join(' ') : '';
                        return name.includes(term) || url.includes(term) || tags.includes(term);
                    });
                }
                renderLinks(filteredLinks);
                updateStats(allLinks.length, filteredLinks.length);
            }

            // ===== STATS =====
            function updateStats(total, visible) {
                totalCountSpan.textContent = total;
                visibleCountSpan.textContent = visible;
                resultCounter.textContent = `${visible} links`;
            }

            // ===== HELPER =====
            function escapeHTML(str) {
                if (!str) return '';
                return String(str).replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // ===== EVENT LISTENER =====
            searchInput.addEventListener('input', function(e) {
                filterLinks(e.target.value);
            });

            // ===== START =====
            loadLinks();

        })();
    </script>

</body>
</html>
